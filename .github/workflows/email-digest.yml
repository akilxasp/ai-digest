name: Email digest

on:
  push:
    paths: ["digests/**.html"]
  workflow_dispatch:
    inputs:
      file:
        description: "Path of digest to send (defaults to newest)"
        required: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick digest
        id: pick
        run: |
          FILE="${{ inputs.file }}"
          if [ -z "$FILE" ]; then
            FILE=$(ls -1 digests/*.html | sort | tail -1)
          fi
          test -f "$FILE" || { echo "no digest found"; exit 1; }
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      # ponytail: stdlib urllib against the Resend REST API — no marketplace
      # action and no SMTP client holding a credential.
      - name: Send via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ vars.MAIL_FROM || 'AI Digest <onboarding@resend.dev>' }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          DIGEST: ${{ steps.pick.outputs.file }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, re, pathlib, urllib.request, urllib.error

          path = pathlib.Path(os.environ["DIGEST"])
          html = path.read_text(encoding="utf-8")

          leftover = sorted(set(re.findall(r"\{\{[A-Z_]+\}\}", html)))
          if leftover:
              raise SystemExit(f"unreplaced placeholders in {path}: {leftover}")

          title = re.search(r"<title>(.*?)</title>", html, re.S)
          user, repo = os.environ["REPO"].split("/")
          url = f"https://{user}.github.io/{repo}/{path.as_posix()}"

          payload = {
              "from": os.environ["MAIL_FROM"],
              "to": [os.environ["MAIL_TO"]],
              "subject": title.group(1).strip() if title else f"AI Digest — {path.stem}",
              "html": html,
              "text": f"Web version: {url}",
          }

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
                  "Content-Type": "application/json",
                  # Cloudflare in front of the API blocks the default
                  # Python-urllib UA with error 1010
                  "User-Agent": "ai-digest/1.0",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print("sent", path, "->", os.environ["MAIL_TO"], json.load(r).get("id"))
          except urllib.error.HTTPError as e:
              # surface Resend's reason (unverified domain, bad key) instead of a bare 4xx
              raise SystemExit(f"resend {e.code}: {e.read().decode()}")
          PY
